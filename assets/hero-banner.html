<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 300px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; }
  .banner {
    width: 1200px; height: 300px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 100%);
    display: flex; align-items: center;
    position: relative; overflow: hidden;
    padding: 0 56px;
  }
  /* Subtle grid overlay */
  .banner::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Glow orbs */
  .orb1 {
    position: absolute; top: -100px; right: 100px; width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(233,84,67,0.22) 0%, transparent 70%);
    border-radius: 50%;
  }
  .orb2 {
    position: absolute; bottom: -120px; left: 300px; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(233,84,67,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .orb3 {
    position: absolute; top: 50%; right: 30%; transform: translateY(-50%); width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 60%);
    border-radius: 50%;
  }
  /* Left: brand */
  .left {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; gap: 12px;
    min-width: 380px; padding-right: 48px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .logo-row { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #e95443 0%, #f06855 100%);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(233,84,67,0.40);
    flex-shrink: 0;
  }
  .logo-icon svg { width: 32px; height: 32px; }
  .logo-text { font-size: 36px; font-weight: 700; color: #fff; letter-spacing: -1px; }
  .tagline {
    font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.70);
    line-height: 1.45; max-width: 320px;
  }
  .tagline strong { color: #fff; font-weight: 700; }
  .badges { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .badge-free {
    background: rgba(233,84,67,0.85); color: #fff; font-size: 10px; font-weight: 700;
    padding: 4px 12px; border-radius: 10px; letter-spacing: 0.6px; text-transform: uppercase;
  }
  .badge-whmcs {
    color: rgba(255,255,255,0.40); font-size: 10.5px; font-weight: 500;
  }
  /* Right: features */
  .right {
    position: relative; z-index: 1;
    flex: 1; padding-left: 48px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .right-label {
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.30);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .features {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .feature {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px; padding: 5px 13px; font-size: 12px; color: rgba(255,255,255,0.70);
    font-weight: 500; backdrop-filter: blur(6px);
    white-space: nowrap;
  }
  .feature.highlight {
    background: rgba(233,84,67,0.18); border-color: rgba(233,84,67,0.35);
    color: #f8a59c;
  }
  .divider {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 1px; height: 180px; background: rgba(255,255,255,0.07);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>

  <div class="left">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15L85 35V45L50 65L15 45V35L50 15Z" fill="white" fill-opacity="0.95"/>
          <path d="M15 35L50 55L85 35V65L50 85L15 65V35Z" fill="white" fill-opacity="0.6"/>
        </svg>
      </div>
      <span class="logo-text">Venmail</span>
    </div>
    <div class="tagline"><strong>The complete email workspace</strong><br>for humans and AI agents.</div>
    <div class="badges">
      <span class="badge-free">Free Module</span>
      <span class="badge-whmcs">WHMCS 8.x &amp; 9.x</span>
    </div>
  </div>

  <div class="right">
    <div class="right-label">Everything your team needs</div>
    <div class="features">
      <span class="feature highlight">Email</span>
      <span class="feature">Calendar</span>
      <span class="feature">Meetings</span>
      <span class="feature">Booking Pages</span>
      <span class="feature highlight">SMTP / API</span>
      <span class="feature">Campaigns</span>
      <span class="feature">CRM</span>
      <span class="feature">SDR</span>
      <span class="feature">Documents</span>
      <span class="feature">Forms</span>
      <span class="feature highlight">AI Workflows</span>
      <span class="feature">Spreadsheets</span>
      <span class="feature">Notes</span>
    </div>
  </div>
</div>
</body>
</html>
