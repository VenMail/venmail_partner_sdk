<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venmail Email</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 20px; color: #333; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; border: 1px solid #e0e0e0; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 13px; word-break: break-all; }
        .btn { display: inline-block; padding: 8px 16px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #1d4ed8; }
        .alert-ok { background: #dcfce7; color: #166534; padding: 10px; border-radius: 4px; margin-bottom: 12px; }
        .alert-warn { background: #fef3c7; color: #92400e; padding: 10px; border-radius: 4px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h2>Venmail Email Setup</h2>
    <div id="app">
        <p>Loading DNS records for your domain...</p>
    </div>
    <script>
        // DirectAdmin passes domain in URL or environment
        const urlParams = new URLSearchParams(window.location.search);
        const domain = urlParams.get('domain') || window.location.hostname;

        fetch('/CMD_PLUGINS/venmail/dns.php?domain=' + encodeURIComponent(domain))
            .then(r => r.json())
            .then(data => {
                const app = document.getElementById('app');
                if (!data.success) {
                    app.innerHTML = '<div class="alert-warn">Could not load DNS records. Make sure Venmail plugin is configured.</div>';
                    return;
                }
                let html = '<div class="card"><h3>DNS Records for ' + domain + '</h3>';
                html += '<table><thead><tr><th>Type</th><th>Name</th><th>Value</th><th>Purpose</th></tr></thead><tbody>';
                (data.data.records || []).forEach(r => {
                    html += '<tr><td><strong>' + r.type + '</strong></td><td><code>' + r.name + '</code></td><td><code>' + r.value + '</code></td><td>' + r.purpose + '</td></tr>';
                });
                html += '</tbody></table></div>';
                html += '<div style="display:flex;gap:10px"><button class="btn" onclick="sso()">Open Venmail Dashboard</button></div>';
                app.innerHTML = html;
            })
            .catch(e => {
                document.getElementById('app').innerHTML = '<div class="alert-warn">Error: ' + e.message + '</div>';
            });

        function sso() {
            fetch('/CMD_PLUGINS/venmail/sso.php?domain=' + encodeURIComponent(domain))
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.data && data.data.sso_url) {
                        window.open(data.data.sso_url, '_blank');
                    } else {
                        alert('SSO failed: ' + (data.message || 'Unknown error'));
                    }
                });
        }
    </script>
</body>
</html>
